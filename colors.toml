# Yerba Mate (dark)
#
# bg:       #1c1e13  Verde-Oliva Chumbo
# fg:       #dce0d9  Cinza Prata
# accent:   #a67c52  Marrom Ocre / Cuia
# keywords: #a67c52  Ocre
# functions:#7eb2d1  Azul Metal / Bomba
# strings:  #8fb339  Verde Erva-Mate
# comments: #4f5b4a  Verde Musgo Escuro

accent = "#a67c52"
cursor = "#a67c52"
foreground = "#dce0d9"
background = "#1c1e13"
selection_foreground = "#1c1e13"
selection_background = "#a67c52"

# 0  shadow surface (ligeiramente mais claro que o bg)
color0 = "#282d1c"
# 1  red — terracota fosco, erros
color1 = "#c25d44"
# 2  green — verde erva-mate, strings
color2 = "#8fb339"
# 3  yellow — marrom ocre, keywords
color3 = "#a67c52"
# 4  blue — azul metal/bomba, functions
color4 = "#7eb2d1"
# 5  magenta — rose fosco, tipos/classes
color5 = "#b07878"
# 6  cyan — teal oliva, anotações/meta
color6 = "#5ea89a"
# 7  white — cinza prata (texto normal)
color7 = "#dce0d9"
# 8  bright black — verde musgo, comments
color8 = "#4f5b4a"
# 9  bright red
color9 = "#d46848"
# 10 bright green
color10 = "#a0c04a"
# 11 bright yellow (ocre mais claro, hover/seleção secundária)
color11 = "#c09060"
# 12 bright blue
color12 = "#90c0dc"
# 13 bright magenta
color13 = "#c08888"
# 14 bright cyan
color14 = "#70b8aa"
